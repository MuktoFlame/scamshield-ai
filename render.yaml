# Render Blueprint — deploys the FastAPI backend.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: scamshield-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: GEMINI_API_KEY
        sync: false   # set in the Render dashboard
      - key: MONGO_URI
        sync: false   # MongoDB Atlas connection string
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false   # e.g. https://scamshield.vercel.app
